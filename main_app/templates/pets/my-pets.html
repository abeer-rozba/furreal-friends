{% extends "base.html" %}

{% block content %}
  <a href="/pets/new">Add Pet</a>
  {% for pet in user.owner.pets.all %}
  <img src="{{pet.photo}}" width="200px">
    <a href="/pets/{{pet.id}}">{{pet.pet_name}}</a>
  {% empty %}
  <p>You have not added your pets yet.</p>
  {% endfor %}
  <a href="/owners/{{user.owner.id}}">Back</a>
{% endblock content %}
