{% extends "base.html" %}

{% block content %}
  <a href="/pets/new">Add Pet</a>
  {% for pet in pets %}
    {% if pet.owner.user.id == user.id %}
    <a href="/pets/{{pet.id}}">{{pet.pet_name}}</a>
    {% endif %}
  {% endfor %}
  <a href="/owners/{{user.owner.id}}">Back</a>
{% endblock content %}
