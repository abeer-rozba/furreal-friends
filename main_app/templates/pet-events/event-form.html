{% extends "base.html" %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">
      {% if form.instance.id %}
        Update Event
      {% else %}
        Create Event
      {% endif %}
    </h1>
    <form method="POST">
  {% csrf_token %}
  <div class="form-fields">
    {{form}}
  </div>

  {% if form.instance.id %}
  <button type="submit" class="btn-primary">Update Event</button>
  {% else %}
  <button type="submit" class="btn-primary">Add Event</button>
  {% endif %}
</form>
  <a href="/events/my-events" class="back-link">← Cancel</a>
  </div>
</div>
{% endblock content %}
