{% extends "base.html" %}

{% block content %}
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Edit Profile</h1>

      <form method="POST">
        {% csrf_token %}
        {{form}}
        <button>Save Changes</button>
      </form>

      <a href="/owners/{{user.owner.id}}" class="back-link">Cancel</a>
    </div>
  </div>

{% endblock content %}
